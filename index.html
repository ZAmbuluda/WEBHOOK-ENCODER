<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Encoder de Webhook</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Encoder de Webhook</h1>
    <form id="webhookForm">
        <label for="webhook">Entrez votre webhook :</label>
        <input type="text" id="webhook" name="webhook" required>
        <button type="submit">Générer le script</button>
    </form>
    <h2 id="resultTitle" style="display:none;">Script Lua généré :</h2>
    <textarea id="luaScript" rows="12" readonly style="display:none;"></textarea>
</div>

<script src="script.js"></script>
</body>
</html>
